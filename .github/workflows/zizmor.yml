name: zizmor

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

jobs:
  zizmor:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    permissions:
      contents: read

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          inputs: "."
          min-severity: low
          min-confidence: low
          version: 1.23.1 # zizmor maintains a static map of version hashes so this is actually pinned https://github.com/zizmorcore/zizmor-action/blob/main/support/versions
          advanced-security: false # print to console instead of uploading a SARIF
          fail-on-no-inputs: true
