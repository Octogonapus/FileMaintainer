name: zizmor

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

jobs:
  zizmor:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    permissions:
      contents: read

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          inputs: "."
          min-severity: low
          min-confidence: low
          version: 1.23.1 # zizmor maintains a static map of version hashes so this is actually pinned https://github.com/zizmorcore/zizmor-action/blob/main/support/versions
          advanced-security: false # print to console instead of uploading a SARIF
          fail-on-no-inputs: true
